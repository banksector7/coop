<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- 💥 โซนแหกแคช: สั่งบราวเซอร์ห้ามจำ ห้ามแคช โหลดใหม่ทุกรอบ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- ============================================== -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA Assemble - Projector Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background-color: #050505; /* พื้นหลังดำตอนเริ่ม */
        }

        /* 🎬 โซน Video Background */
        #video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; /* ให้วิดีโอคลุมเต็มหน้าจอพอดี */
            z-index: 0; /* 💥 แก้ให้อยู่เหนือพื้นดำ จะได้มองเห็น */
            pointer-events: none;
            opacity: 0; /* 💥 ซ่อนไว้ก่อน จะโชว์ตอนรวมร่างเสร็จ */
            transition: opacity 0.3s ease-in;
        }

        #bg-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: 1; pointer-events: none;
        }

        canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 5; }

        #loading-overlay { position: absolute; inset: 0; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ffffff33; border-top: 4px solid #ff007f; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 👆 ปุ่มปลดล็อคเสียง */
        #audio-unlocker {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
            color: white; font-size: 2.5rem; text-align: center; font-weight: 900;
        }
        
        /* 💥 ข้อความเริ่มเกมกลางจอ 💥 */
        #center-title {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            color: white;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 40px #ff007f, 0 0 15px #7c3aed;
            z-index: 50;
            pointer-events: none;
            transition: opacity 1s ease-out; 
        }
        
        #countdown-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; color: white; font-weight: 900;
            text-shadow: 0 0 50px #ff007f, 0 0 20px #7c3aed;
            z-index: 100; pointer-events: none; display: none;
            transition: transform 0.2s ease-out;
        }
        
        #status-txt {
            position: absolute; bottom: 10px; right: 10px; z-index: 50; color: rgba(255,255,255,0.8); font-size: 14px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- 💥 โซนวิดีโอ MP4: ลบ autoplay ออกเพื่อรอคำสั่ง 💥 -->
    <video id="video-bg" loop playsinline preload="auto">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="load-msg">กำลังเตรียมระบบและรอเชื่อมต่อแอดมิน...</div>
    </div>

    <!-- กด 1 ทีเพื่อปลดบล็อกเสียง -->
    <div id="audio-unlocker">
        👆 คลิกที่หน้าจอ 1 ครั้ง<br>
        <span style="font-size:1.5rem; color:#ff007f;">เพื่อเปิดระบบเตรียมพร้อม</span>
    </div>
    
    <div id="bg-overlay"></div> 
    
    <!-- ข้อความกลางจอก่อนเริ่ม -->
    <div id="center-title">อาชีพในฝันของ<br>เด็ก Gen Z LA</div>
    
    <div id="countdown-display">5</div>
    <div id="status-txt">Offline</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ========================================================
        // ⚠️ ขั้นตอนสำคัญ: เอา Config จาก Firebase Console มาแปะที่นี่ ⚠️
        // ========================================================
       const firebaseConfig = {
  apiKey: "AIzaSyALk3ZQ14UuoHmcN8NT8CinWN6Y49VgMuk",
  authDomain: "fireworks-d5460.firebaseapp.com",
  projectId: "fireworks-d5460",
  storageBucket: "fireworks-d5460.firebasestorage.app",
  messagingSenderId: "663921177257",
  appId: "1:663921177257:web:f885d1bc8b8833c423efb8"
};

        let WORD_LIST = []; 
        let particlesSpawned = false; 
        const START_PARTICLES = 300;
        const MAX_PARTICLES = 3000; 
        const HOT_PINK_RGB = { r: 255, g: 105, b: 180 };

        const AUDIO_FILES = {
            assemble: 'https://actions.google.com/sounds/v1/science_fiction/stutter_bass_hit.ogg'
        };

        let app, particleContainer;
        let particles = [];
        let showcaseTexts = []; 
        
        let validTargets = [];
        let shakeAmount = 0;
        let mode = 'WANDER'; 
        let isAssembling = false;
        
        let cachedTextures = [];

        let lastTriggerValue = null; 
        let lastReceivedWordsJSON = "";
        let isFirstLoad = true; 

        let audioCtx;
        let audioBuffers = {};

        // 💥 ปลดล็อกเสียงตอนคลิกจอ และสั่งเล่นวิดีโอ 1 ทีแล้วหยุด เพื่อหลอกเบราว์เซอร์ว่า user อนุญาตแล้ว 💥
        document.getElementById('audio-unlocker').addEventListener('click', function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const vid = document.getElementById('video-bg');
            if(vid) {
                vid.muted = false;
                let playPromise = vid.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        vid.pause();
                        vid.currentTime = 0;
                    }).catch(e => console.log("Video play error:", e));
                }
            }
            
            this.style.display = 'none';
        });

        async function loadSounds() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const loader = async (name, url) => {
                if (url.includes('ใส่_LINK')) return; 
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
                } catch (err) {
                    console.warn(`ไม่สามารถโหลดเสียง "${name}" ได้:`, err.message);
                }
            };
            const promises = Object.entries(AUDIO_FILES).map(([name, url]) => loader(name, url));
            await Promise.all(promises);
        }

        function playSound(name, volume = 0.5) {
            if (!audioBuffers[name] || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffers[name];
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = volume;
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start(0);
        }

        function hslToHex(h, s, l) {
            l /= 100; const a = s * Math.min(l, 1 - l) / 100;
            const f = n => { const k = (n + h / 30) % 12; const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); return Math.round(255 * color).toString(16).padStart(2, '0'); };
            return parseInt(`0x${f(0)}${f(8)}${f(4)}`);
        }
        function hexToRgb(hex) { return { r: (hex >> 16) & 0xFF, g: (hex >> 8) & 0xFF, b: hex & 0xFF }; }
        function rgbToHex(r, g, b) { return (r << 16) + (g << 8) + b; }
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function applyNewWords(rawWordsArray) {
            if (!app || !app.renderer) return;

            let processedWords = [];
            let rawArray = Array.isArray(rawWordsArray) ? rawWordsArray : [rawWordsArray];
            
            rawArray.forEach(w => {
                let splitParts = String(w).split(/[\r\n\t,;|]+/).map(s => s.trim()).filter(s => s.length > 0);
                processedWords.push(...splitParts);
            });
            
            processedWords = [...new Set(processedWords)];
            if(processedWords.length === 0) return; 
            
            WORD_LIST = processedWords;
            const oldTextures = [...cachedTextures]; 
            
            cachedTextures = WORD_LIST.map(word => {
                const text = new PIXI.Text(word, { fontFamily: 'Kanit', fontWeight: '900', fontSize: 24, fill: 0xFFFFFF });
                return app.renderer.generateTexture(text);
            });

            const titleElem = document.getElementById('center-title');
            if(titleElem) titleElem.style.opacity = '0';

            let shuffledTextures = [...cachedTextures];
            shuffleArray(shuffledTextures);

            if (!particlesSpawned) {
                for(let i=0; i<START_PARTICLES; i++) {
                    let p = createSingleParticle(Math.random() * app.screen.width, Math.random() * app.screen.height);
                    if(p) {
                        p.sprite.texture = shuffledTextures[i % shuffledTextures.length];
                        particles.push(p);
                    }
                }
                particlesSpawned = true; 
            } else {
                particles.forEach((p, index) => {
                    p.sprite.texture = shuffledTextures[index % shuffledTextures.length];
                });
            }

            setTimeout(() => {
                oldTextures.forEach(t => { try { t.destroy(true); } catch(e){} });
            }, 500);
        }

        async function initGraphics() {
            try { await document.fonts.load('900 20px Kanit'); await loadSounds(); } catch (e) {}

            app = new PIXI.Application({ 
                resizeTo: window, backgroundAlpha: 0, antialias: false, resolution: window.devicePixelRatio || 1, autoDensity: true 
            });
            document.body.appendChild(app.view);

            particleContainer = new PIXI.Container();
            app.stage.addChild(particleContainer);

            generateTargets();

            window.addEventListener('resize', () => { if(mode === 'ASSEMBLE') generateTargets(true); });
            app.ticker.add(update);
        }

        function initFirebase() {
            let config = firebaseConfig;
            
            if(!config || !config.projectId) {
                document.getElementById('status-txt').innerText = "Local Mode (No Cloud)";
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                window.addEventListener('click', () => { if(!isAssembling) startCountdown(); });
                return;
            }

            const appFb = initializeApp(config);
            const auth = getAuth(appFb);
            const db = getFirestore(appFb);
            const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'la-assemble-app';

            const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch (err) {
                    console.error("Auth Error:", err);
                    document.getElementById('load-msg').innerText = "❌ Firebase พัง (ลืมเปิด Anonymous Auth หรือเปล่า?)";
                    document.getElementById('load-msg').style.color = "#ff4444";
                    document.getElementById('status-txt').innerText = "Auth Error";
                    setTimeout(() => {
                        document.getElementById('loading-overlay').style.opacity = '0';
                        setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                        window.addEventListener('click', () => { if(!isAssembling) startCountdown(); });
                    }, 3000);
                }
            };

            initAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('status-txt').innerText = "Cloud Connected 🟢";
                    document.getElementById('status-txt').style.color = "#4ade80";
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                    
                    const controlDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'control', 'state');
                    onSnapshot(controlDocRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            
                            if (data.words && Array.isArray(data.words)) {
                                let incomingJSON = JSON.stringify(data.words);
                                
                                if (isFirstLoad) {
                                    lastReceivedWordsJSON = incomingJSON;
                                } else if (incomingJSON !== lastReceivedWordsJSON) {
                                    lastReceivedWordsJSON = incomingJSON;
                                    applyNewWords(data.words);
                                    
                                    const st = document.getElementById('status-txt');
                                    st.innerText = "🔥 ดึงมาโชว์แล้วทั้งหมด " + WORD_LIST.length + " คำรัวๆ!";
                                    st.style.color = "#22d3ee"; 
                                    setTimeout(() => {
                                        st.innerText = "Cloud Connected 🟢";
                                        st.style.color = "#4ade80"; 
                                    }, 4000);
                                }
                            }

                            if (data.triggerAssemble) {
                                if (isFirstLoad || lastTriggerValue === null) {
                                    lastTriggerValue = data.triggerAssemble;
                                } else if (data.triggerAssemble !== lastTriggerValue) {
                                    lastTriggerValue = data.triggerAssemble;
                                    if(!isAssembling) startCountdown();
                                }
                            }
                            
                            isFirstLoad = false; 
                        }
                    });
                }
            });
        }

        function generateTargets(reassign = false) {
            const tempCanvas = document.createElement('canvas');
            const w = Math.max(window.innerWidth || 800, 1);
            const h = Math.max(window.innerHeight || 600, 1);
            
            tempCanvas.width = w; tempCanvas.height = h;
            const ctx = tempCanvas.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = 'white';
            const maxFontSize = 800;
            const fontSize = Math.min(w * 0.8, h * 0.7, maxFontSize);
            ctx.font = `900 ${fontSize}px Kanit`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            ctx.fillText('LA', w / 2, h / 2 - (h * 0.05)); 
            
            const imgData = ctx.getImageData(0, 0, w, h).data;
            validTargets = [];
            for (let y = 0; y < h; y += 2) {
                for (let x = 0; x < w; x += 2) {
                    if (imgData[(y * w + x) * 4] > 128) validTargets.push({ x, y });
                }
            }
            if (reassign) assignTargetsEvenly();
        }

        function assignTargetsEvenly() {
            if (validTargets.length === 0) return;
            shuffleArray(validTargets);
            for(let i=0; i < particles.length; i++) {
                const tgt = validTargets[i % validTargets.length];
                particles[i].tx = tgt.x; particles[i].ty = tgt.y;
            }
        }

        function createSingleParticle(x, y) {
            if (cachedTextures.length === 0) return null; 
            
            const tex = cachedTextures[Math.floor(Math.random() * cachedTextures.length)];
            const sprite = new PIXI.Sprite(tex);
            sprite.anchor.set(0.5);
            
            const baseScale = (Math.random() * 1.5 + 2.5) / 24; 
            sprite.scale.set(baseScale * 2.5); 
            
            const startColor = hslToHex(Math.random() * 360, 80, 70);
            sprite.tint = startColor;
            const p = {
                sprite: sprite, x: x, y: y,
                vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                tx: 0, ty: 0, seed: Math.random() * 1000,
                rgb: hexToRgb(startColor),
                baseScale: baseScale,
                currentScale: baseScale * 2.5
            };
            sprite.x = p.x; sprite.y = p.y;
            particleContainer.addChild(sprite);
            return p;
        }

        function startCountdown() {
            if(particles.length === 0) {
                applyNewWords(["ความหวัง", "ความฝัน", "อนาคต"]);
            }
            
            const titleElem = document.getElementById('center-title');
            if(titleElem) titleElem.style.opacity = '0';

            if(isAssembling) return;
            isAssembling = true;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            const cd = document.getElementById('countdown-display');
            cd.style.display = 'block';
            let count = 5;
            cd.innerText = count;
            
            cd.style.transform = "translate(-50%, -50%) scale(1.3)";
            setTimeout(() => cd.style.transform = "translate(-50%, -50%) scale(1)", 150);

            const iv = setInterval(() => {
                count--;
                if (count > 0) {
                    cd.innerText = count;
                    cd.style.transform = "translate(-50%, -50%) scale(1.3)";
                    setTimeout(() => cd.style.transform = "translate(-50%, -50%) scale(1)", 150);
                } else {
                    clearInterval(iv);
                    cd.style.display = 'none';
                    runShowcaseSequence(); 
                }
            }, 1000);
        }

        function runShowcaseSequence() {
            let count = 0;
            const totalShowcase = 5;
            
            let wordsToShow = [];
            for(let i=0; i<totalShowcase; i++) {
                wordsToShow.push(WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)] || "LA");
            }

            const iv = setInterval(() => {
                if (count >= totalShowcase) {
                    clearInterval(iv);
                    setTimeout(() => triggerBurst(), 400); 
                    return;
                }

                const text = new PIXI.Text(wordsToShow[count], { 
                    fontFamily: 'Kanit', fontWeight: '900', fontSize: 100, fill: 0xFFFFFF,
                    dropShadow: true, dropShadowColor: '#ff007f', dropShadowBlur: 20, dropShadowDistance: 0 
                });
                text.anchor.set(0.5);
                text.x = app.screen.width / 2 + (Math.random()-0.5) * 300;
                text.y = app.screen.height / 2 + (Math.random()-0.5) * 200;
                
                const pinkPurples = [0xff007f, 0x7c3aed, 0xff1493, 0xd946ef, 0xf472b6];
                text.tint = pinkPurples[Math.floor(Math.random() * pinkPurples.length)];
                
                app.stage.addChild(text); 
                
                showcaseTexts.push({ sprite: text, life: 1.0, scale: 0.2 });
                playSound('assemble', 0.4); 
                
                count++;
            }, 450); 
        }

        function triggerBurst() {
            playSound('assemble', 0.8); 
            
            const currentCount = particles.length;
            const spawnPerParticle = Math.floor((MAX_PARTICLES - currentCount) / currentCount);
            
            let shuffledTextures = [...cachedTextures];
            shuffleArray(shuffledTextures);
            let textureIndex = 0;

            let newParticles = [];
            for(let i=0; i < currentCount; i++) {
                let parent = particles[i];
                parent.vx = (Math.random() - 0.5) * 50; parent.vy = (Math.random() - 0.5) * 50;
                for(let j=0; j < spawnPerParticle; j++) {
                    let p = createSingleParticle(parent.x, parent.y);
                    if(p) {
                        p.vx = (Math.random() - 0.5) * 50; p.vy = (Math.random() - 0.5) * 50;
                        p.sprite.texture = shuffledTextures[textureIndex % shuffledTextures.length];
                        textureIndex++;
                        newParticles.push(p);
                    }
                }
            }
            particles = particles.concat(newParticles);
            assignTargetsEvenly();
            mode = 'BURST'; shakeAmount = 20; 
            
            // 💥 หน่วงเวลา 1200ms รอให้คำวิ่งมารวมร่างเสร็จ แล้วแสดงและเล่นคลิปวิดีโอพร้อมเปิดเสียงทันที!
            setTimeout(() => { 
                mode = 'ASSEMBLE'; 
                
                const vid = document.getElementById('video-bg');
                if(vid) {
                    vid.style.opacity = '1'; // โชว์ภาพขึ้นมา
                    vid.muted = false;       // เปิดเสียง
                    vid.currentTime = 0;     // เล่นจากวิแรก
                    vid.play().catch(e => console.log("Video play error:", e));
                }
            }, 1200);
        }

        function update(delta) {
            const time = performance.now() * 0.002;
            const w = app.screen.width, h = app.screen.height;
            
            if (shakeAmount > 0.1) {
                app.stage.x = (Math.random() - 0.5) * shakeAmount; app.stage.y = (Math.random() - 0.5) * shakeAmount; shakeAmount *= 0.85;
            } else { app.stage.x = 0; app.stage.y = 0; }

            for (let i = showcaseTexts.length - 1; i >= 0; i--) {
                let st = showcaseTexts[i];
                st.life -= 0.02 * delta; 
                st.scale += 0.06 * delta; 
                st.sprite.scale.set(st.scale);
                st.sprite.alpha = st.life;
                if (st.life <= 0) {
                    app.stage.removeChild(st.sprite); st.sprite.destroy(); showcaseTexts.splice(i, 1);
                }
            }

            const slowSpring = 0.004; const slowFriction = 0.94; 
            const targetModeScale = (mode === 'WANDER' && !isAssembling) ? 2.5 : 1.0;

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                const targetScale = p.baseScale * targetModeScale;
                p.currentScale += (targetScale - p.currentScale) * 0.05 * delta;
                p.sprite.scale.set(p.currentScale);

                if (mode === 'WANDER') {
                    p.x += p.vx * delta; p.y += p.vy * delta;
                    p.x += Math.sin(time + p.seed) * 0.4 * delta; p.y += Math.cos(time + p.seed) * 0.4 * delta;
                    if (p.x < 0 || p.x > w) p.vx *= -1; if (p.y < 0 || p.y > h) p.vy *= -1;
                } else if (mode === 'BURST') {
                    p.vx *= 0.9; p.vy *= 0.9; p.x += p.vx * delta; p.y += p.vy * delta;
                } else if (mode === 'ASSEMBLE') {
                    const ax = (p.tx - p.x) * slowSpring; const ay = (p.ty - p.y) * slowSpring;
                    p.vx = (p.vx + ax * delta) * slowFriction; p.vy = (p.vy + ay * delta) * slowFriction;
                    p.x += p.vx * delta; p.y += p.vy * delta;
                    p.rgb.r += (HOT_PINK_RGB.r - p.rgb.r) * 0.01 * delta; p.rgb.g += (HOT_PINK_RGB.g - p.rgb.g) * 0.01 * delta; p.rgb.b += (HOT_PINK_RGB.b - p.rgb.b) * 0.01 * delta;
                    p.sprite.tint = rgbToHex(Math.floor(p.rgb.r), Math.floor(p.rgb.g), Math.floor(p.rgb.b));
                }
                p.sprite.x = p.x; p.sprite.y = p.y;
            }
        }

        initGraphics().then(() => initFirebase());
    </script>
