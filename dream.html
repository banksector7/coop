<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA Assemble - Projector Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background-image: url('1000071517.png'); /* เปลี่ยนรูปตึกมึงตรงนี้ */
            background-size: cover;
            background-position: center bottom; 
            background-repeat: no-repeat;
            background-color: #050505;
        }
        
        #bg-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: 1; pointer-events: none;
        }

        canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 5; }

        #loading-overlay { position: absolute; inset: 0; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ffffff33; border-top: 4px solid #ff007f; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #countdown-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; color: white; font-weight: 900;
            text-shadow: 0 0 50px #ff007f, 0 0 20px #7c3aed;
            z-index: 100; pointer-events: none; display: none;
            transition: transform 0.2s ease-out;
        }
        
        #status-txt {
            position: absolute; bottom: 10px; right: 10px; z-index: 50; color: rgba(255,255,255,0.3); font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="load-msg">กำลังเตรียมระบบและรอเชื่อมต่อแอดมิน...</div>
    </div>
    
    <div id="bg-overlay"></div> 
    
    <div id="countdown-display">5</div>
    <div id="status-txt">Offline</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let WORD_LIST = ["ความฝัน", "อนาคต", "ความหวัง", "ความสุข"]; // ค่าเริ่มต้นตอนยังไม่พิมพ์
        const START_PARTICLES = 300;
        const MAX_PARTICLES = 3000; 
        const HOT_PINK_RGB = { r: 255, g: 105, b: 180 };

        const AUDIO_FILES = {
            assemble: 'https://actions.google.com/sounds/v1/science_fiction/stutter_bass_hit.ogg',
            firework: 'https://actions.google.com/sounds/v1/explosions/clank_clatter_explosion.ogg'
        };

        let app, particleContainer, fwContainer;
        let particles = [];
        let rockets = [];
        let fwParticles = [];
        let hearts = []; 
        let validTargets = [];
        let shakeAmount = 0;
        let mode = 'WANDER'; 
        let isAssembling = false;
        
        let cachedTextures = [];
        let fwTexCache = null;
        let heartTexCache = null; 

        // --- ระบบเสียง ---
        let audioCtx;
        let audioBuffers = {};

        async function loadSounds() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const loader = async (name, url) => {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const arrayBuffer = await response.arrayBuffer();
                    audioBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
                } catch (err) {
                    console.warn(`ไม่สามารถโหลดเสียง "${name}" ได้:`, err.message);
                }
            };
            const promises = Object.entries(AUDIO_FILES).map(([name, url]) => loader(name, url));
            await Promise.all(promises);
        }

        function playSound(name, volume = 0.5) {
            if (!audioBuffers[name] || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffers[name];
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = volume;
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start(0);
        }

        function hslToHex(h, s, l) {
            l /= 100; const a = s * Math.min(l, 1 - l) / 100;
            const f = n => { const k = (n + h / 30) % 12; const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); return Math.round(255 * color).toString(16).padStart(2, '0'); };
            return parseInt(`0x${f(0)}${f(8)}${f(4)}`);
        }
        function hexToRgb(hex) { return { r: (hex >> 16) & 0xFF, g: (hex >> 8) & 0xFF, b: hex & 0xFF }; }
        function rgbToHex(r, g, b) { return (r << 16) + (g << 8) + b; }
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function generateWordTextures() {
            // ล้างของเก่าทิ้งป้องกัน RAM บวม
            cachedTextures.forEach(t => t.destroy(true));
            cachedTextures = WORD_LIST.map(word => {
                const text = new PIXI.Text(word, { fontFamily: 'Kanit', fontWeight: '900', fontSize: 24, fill: 0xFFFFFF });
                return app.renderer.generateTexture(text);
            });
        }

        function updateParticleTextures() {
            if(cachedTextures.length === 0) return;
            particles.forEach(p => {
                const tex = cachedTextures[Math.floor(Math.random() * cachedTextures.length)];
                p.sprite.texture = tex;
            });
        }

        async function initGraphics() {
            try { await document.fonts.load('900 20px Kanit'); await loadSounds(); } catch (e) {}

            app = new PIXI.Application({ 
                resizeTo: window, backgroundAlpha: 0, antialias: false, resolution: window.devicePixelRatio || 1, autoDensity: true 
            });
            document.body.appendChild(app.view);

            particleContainer = new PIXI.ParticleContainer(MAX_PARTICLES, { scale: true, position: true, tint: true });
            fwContainer = new PIXI.Container();
            app.stage.addChild(fwContainer); 
            app.stage.addChild(particleContainer);

            const g = new PIXI.Graphics();
            g.beginFill(0xFFFFFF); g.drawCircle(0, 0, 4); g.endFill();
            fwTexCache = app.renderer.generateTexture(g);

            const heartText = new PIXI.Text('❤', { fontFamily: 'Arial', fontSize: 32, fill: 0xFFFFFF });
            heartTexCache = app.renderer.generateTexture(heartText);

            generateWordTextures();
            generateTargets();
            for(let i=0; i<START_PARTICLES; i++) {
                particles.push(createSingleParticle(Math.random() * app.screen.width, Math.random() * app.screen.height));
            }

            window.addEventListener('resize', () => { if(mode === 'ASSEMBLE') generateTargets(true); });
            app.ticker.add(update);
        }

        // --- ตั้งค่า Firebase ---
        function initFirebase() {
            const fConfigRaw = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : '{}';
            //let firebaseConfig = {};
            const firebaseConfig = {
                  apiKey: "AIzaSyALk3ZQ14UuoHmcN8NT8CinWN6Y49VgMuk",
                  authDomain: "fireworks-d5460.firebaseapp.com",
                  projectId: "fireworks-d5460",
                  storageBucket: "fireworks-d5460.firebasestorage.app",
                  messagingSenderId: "663921177257",
                  appId: "1:663921177257:web:f885d1bc8b8833c423efb8"
                };
            try { firebaseConfig = JSON.parse(fConfigRaw); } catch(e){}
            
            // ถ้าไม่มี Config ให้ข้ามไปรัน Local Mode เลย
            if(!firebaseConfig.projectId) {
                document.getElementById('status-txt').innerText = "Local Mode (No Cloud)";
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                
                // แตะจอเพื่อเริ่มเองได้เลยถ้าเน็ตหลุดหรือไม่ได้ต่อ Database
                window.addEventListener('click', () => { if(!isAssembling) startCountdown(); });
                return;
            }

            const appFb = initializeApp(firebaseConfig);
            const auth = getAuth(appFb);
            const db = getFirestore(appFb);
            const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'la-assemble-app';

            const initAuth = async () => {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                    await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };

            initAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('status-txt').innerText = "Cloud Connected 🟢";
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                    
                    // รอรับข้อมูลจากแอดมิน
                    const controlDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'control', 'state');
                    onSnapshot(controlDocRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            
                            // 1. รับคำที่ส่งมาใหม่
                            if (data.words && Array.isArray(data.words) && data.words.length > 0) {
                                if(JSON.stringify(data.words) !== JSON.stringify(WORD_LIST)) {
                                    WORD_LIST = data.words;
                                    generateWordTextures();
                                    updateParticleTextures();
                                }
                            }
                            
                            // 2. รับคำสั่งจุดระเบิด
                            if (data.triggerAssemble && data.triggerAssemble > 0) {
                                if(!isAssembling) {
                                    startCountdown();
                                }
                            }
                        }
                    }, (err) => {
                        console.error("Firebase Sync Error", err);
                    });
                }
            });
        }

        function generateTargets(reassign = false) {
            const tempCanvas = document.createElement('canvas');
            const w = Math.max(window.innerWidth || 800, 1);
            const h = Math.max(window.innerHeight || 600, 1);
            
            tempCanvas.width = w; tempCanvas.height = h;
            const ctx = tempCanvas.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = 'white';
            const maxFontSize = 800;
            const fontSize = Math.min(w * 0.8, h * 0.7, maxFontSize);
            ctx.font = `900 ${fontSize}px Kanit`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            ctx.fillText('LA', w / 2, h / 2 - (h * 0.05)); 
            
            const imgData = ctx.getImageData(0, 0, w, h).data;
            validTargets = [];
            for (let y = 0; y < h; y += 2) {
                for (let x = 0; x < w; x += 2) {
                    if (imgData[(y * w + x) * 4] > 128) validTargets.push({ x, y });
                }
            }
            if (reassign) assignTargetsEvenly();
        }

        function assignTargetsEvenly() {
            if (validTargets.length === 0) return;
            shuffleArray(validTargets);
            for(let i=0; i < particles.length; i++) {
                const tgt = validTargets[i % validTargets.length];
                particles[i].tx = tgt.x; particles[i].ty = tgt.y;
            }
        }

        function createSingleParticle(x, y) {
            const tex = cachedTextures[Math.floor(Math.random() * cachedTextures.length)];
            const sprite = new PIXI.Sprite(tex);
            sprite.anchor.set(0.5);
            sprite.scale.set((Math.random() * 1.5 + 2.5) / 24); 
            const startColor = hslToHex(Math.random() * 360, 80, 70);
            sprite.tint = startColor;
            const p = {
                sprite: sprite, x: x, y: y,
                vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                tx: 0, ty: 0, seed: Math.random() * 1000,
                rgb: hexToRgb(startColor),
            };
            sprite.x = p.x; sprite.y = p.y;
            particleContainer.addChild(sprite);
            return p;
        }

        function spawnRocket() {
            const s = new PIXI.Sprite(fwTexCache);
            s.anchor.set(0.5); s.scale.y = 2;
            const color = hslToHex(Math.random() * 360, 100, 60);
            s.tint = color; s.x = Math.random() * app.screen.width; s.y = app.screen.height + 20;
            fwContainer.addChild(s);
            rockets.push({ sprite: s, vy: -(Math.random() * 8 + 15), ty: Math.random() * (app.screen.height * 0.5) + 50, color: color });
        }

        function explode(x, y, color) {
            shakeAmount = 12; 
            playSound('firework', 0.6); 
            for (let i = 0; i < 45; i++) {
                const isHeart = Math.random() < 0.4;
                const s = new PIXI.Sprite(isHeart ? heartTexCache : fwTexCache);
                s.anchor.set(0.5); s.tint = color; s.blendMode = PIXI.BLEND_MODES.ADD;
                if (isHeart) s.scale.set(0.15 + Math.random() * 0.1); 
                
                s.x = x; s.y = y; fwContainer.addChild(s);
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 10 + 3;
                fwParticles.push({ sprite: s, vx: Math.cos(angle) * force, vy: Math.sin(angle) * force, life: 1.0, decay: Math.random() * 0.015 + 0.01 });
            }
        }

        function spawnHeart() {
            const s = new PIXI.Sprite(heartTexCache);
            s.anchor.set(0.5);
            s.x = Math.random() * app.screen.width;
            s.y = app.screen.height + 30; 
            const pinkShades = [0xff69b4, 0xff1493, 0xffb6c1, 0xff007f];
            s.tint = pinkShades[Math.floor(Math.random() * pinkShades.length)];
            s.scale.set(Math.random() * 0.4 + 0.3); 
            fwContainer.addChild(s);
            hearts.push({
                sprite: s, vy: -(Math.random() * 2 + 2), baseX: s.x,
                wiggleSpeed: Math.random() * 0.05 + 0.02, wiggleOffset: Math.random() * Math.PI * 2, 
                life: 1.0, decay: Math.random() * 0.003 + 0.001 
            });
        }

        function startCountdown() {
            if(isAssembling) return;
            isAssembling = true;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            const cd = document.getElementById('countdown-display');
            cd.style.display = 'block';
            let count = 5;
            cd.innerText = count;
            
            cd.style.transform = "translate(-50%, -50%) scale(1.3)";
            setTimeout(() => cd.style.transform = "translate(-50%, -50%) scale(1)", 150);

            const iv = setInterval(() => {
                count--;
                if (count > 0) {
                    cd.innerText = count;
                    cd.style.transform = "translate(-50%, -50%) scale(1.3)";
                    setTimeout(() => cd.style.transform = "translate(-50%, -50%) scale(1)", 150);
                } else {
                    clearInterval(iv);
                    cd.style.display = 'none';
                    triggerBurst(); 
                }
            }, 1000);
        }

        function triggerBurst() {
            playSound('assemble', 0.8); 
            
            const currentCount = particles.length;
            const spawnPerParticle = Math.floor((MAX_PARTICLES - currentCount) / currentCount);
            let newParticles = [];
            for(let i=0; i < currentCount; i++) {
                let parent = particles[i];
                parent.vx = (Math.random() - 0.5) * 50; parent.vy = (Math.random() - 0.5) * 50;
                for(let j=0; j < spawnPerParticle; j++) {
                    let p = createSingleParticle(parent.x, parent.y);
                    p.vx = (Math.random() - 0.5) * 50; p.vy = (Math.random() - 0.5) * 50;
                    newParticles.push(p);
                }
            }
            particles = particles.concat(newParticles);
            assignTargetsEvenly();
            mode = 'BURST'; shakeAmount = 20; 
            setTimeout(() => { mode = 'ASSEMBLE'; spawnRocket(); }, 1200);
        }

        function update(delta) {
            const time = performance.now() * 0.002;
            const w = app.screen.width, h = app.screen.height;
            
            if (shakeAmount > 0.1) {
                app.stage.x = (Math.random() - 0.5) * shakeAmount; app.stage.y = (Math.random() - 0.5) * shakeAmount; shakeAmount *= 0.85;
            } else { app.stage.x = 0; app.stage.y = 0; }

            for (let i = rockets.length - 1; i >= 0; i--) {
                const r = rockets[i]; r.sprite.y += r.vy * delta; r.vy *= 0.98; 
                if (r.sprite.y <= r.ty || r.vy > -2) {
                    explode(r.sprite.x, r.sprite.y, r.color); fwContainer.removeChild(r.sprite); r.sprite.destroy(); rockets.splice(i, 1);
                }
            }
            
            for (let i = fwParticles.length - 1; i >= 0; i--) {
                const fw = fwParticles[i]; fw.vy += 0.15 * delta; fw.vx *= 0.96; fw.vy *= 0.96;
                fw.sprite.x += fw.vx * delta; fw.sprite.y += fw.vy * delta; fw.life -= fw.decay * delta; fw.sprite.alpha = fw.life;
                if (fw.life <= 0) { fwContainer.removeChild(fw.sprite); fw.sprite.destroy(); fwParticles.splice(i, 1); }
            }

            for (let i = hearts.length - 1; i >= 0; i--) {
                const h = hearts[i];
                h.sprite.y += h.vy * delta; h.sprite.x = h.baseX + Math.sin(time * 50 * h.wiggleSpeed + h.wiggleOffset) * 30;
                h.life -= h.decay * delta; h.sprite.alpha = h.life;
                if (h.life <= 0 || h.sprite.y < -50) { fwContainer.removeChild(h.sprite); h.sprite.destroy(); hearts.splice(i, 1); }
            }

            if (mode === 'ASSEMBLE') {
                if (Math.random() < 0.03) spawnRocket(); 
                if (Math.random() < 0.25) spawnHeart();  
            }

            const slowSpring = 0.004; const slowFriction = 0.94; 
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                if (mode === 'WANDER') {
                    p.x += p.vx * delta; p.y += p.vy * delta;
                    p.x += Math.sin(time + p.seed) * 0.4 * delta; p.y += Math.cos(time + p.seed) * 0.4 * delta;
                    if (p.x < 0 || p.x > w) p.vx *= -1; if (p.y < 0 || p.y > h) p.vy *= -1;
                } else if (mode === 'BURST') {
                    p.vx *= 0.9; p.vy *= 0.9; p.x += p.vx * delta; p.y += p.vy * delta;
                } else if (mode === 'ASSEMBLE') {
                    const ax = (p.tx - p.x) * slowSpring; const ay = (p.ty - p.y) * slowSpring;
                    p.vx = (p.vx + ax * delta) * slowFriction; p.vy = (p.vy + ay * delta) * slowFriction;
                    p.x += p.vx * delta; p.y += p.vy * delta;
                    p.rgb.r += (HOT_PINK_RGB.r - p.rgb.r) * 0.01 * delta; p.rgb.g += (HOT_PINK_RGB.g - p.rgb.g) * 0.01 * delta; p.rgb.b += (HOT_PINK_RGB.b - p.rgb.b) * 0.01 * delta;
                    p.sprite.tint = rgbToHex(Math.floor(p.rgb.r), Math.floor(p.rgb.g), Math.floor(p.rgb.b));
                }
                p.sprite.x = p.x; p.sprite.y = p.y;
            }
        }

        initGraphics().then(() => initFirebase());
    </script>
</body>
</html>
