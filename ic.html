        const container = document.getElementById('dataContainer');
        const searchInput = document.getElementById('searchInput');
        const noResult = document.getElementById('noResult');
        const resultCount = document.getElementById('resultCount');

        // ฟังก์ชันสร้างการ์ด HTML
        function renderCards(data) {
            container.innerHTML = '';
            
            if(data.length === 0) {
                noResult.classList.remove('hidden');
                resultCount.textContent = `พบ 0 รายการ`;
                return;
            }
            
            noResult.classList.add('hidden');
            
            // นับจำนวนนศ.ทั้งหมดที่แสดง
            let totalStudents = 0;

            data.forEach(item => {
                totalStudents += item.students.length;
                
                // สร้างกล่องหลัก (Card)
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow";
                
                // หัวข้อบริษัท + Badge จำนวน
                const header = document.createElement('div');
                header.className = "flex justify-between items-start mb-3 border-b border-gray-100 pb-3";
                header.innerHTML = `
                    <h2 class="text-base font-semibold text-blue-900 pr-2">${item.company}</h2>
                    <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-1 rounded-full whitespace-nowrap">
                        ${item.students.length} คน
                    </span>
                `;
                
                // รายการนักศึกษา
                const list = document.createElement('ul');
                list.className = "space-y-2";
                
                item.students.forEach(student => {
                    const li = document.createElement('li');
                    li.className = "text-sm text-gray-700 flex items-start";
                    li.innerHTML = `
                        <span class="text-blue-400 mr-2 mt-0.5">•</span>
                        <span>${student}</span>
                    `;
                    list.appendChild(li);
                });

                card.appendChild(header);
                card.appendChild(list);
                container.appendChild(card);
            });

            resultCount.textContent = `พบ ${data.length} สถานประกอบการ (${totalStudents} คน)`;
        }

        // โหลดข้อมูลครั้งแรก
        renderCards(rawData);

        // ระบบค้นหา (ทำงานทันทีที่พิมพ์)
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            
            const filteredData = rawData.filter(item => {
                // หาในชื่อบริษัท
                if(item.company.toLowerCase().includes(keyword)) return true;
                
                // หาในรายชื่อนักศึกษา หรือ อาจารย์
                const foundInStudents = item.students.some(student => 
                    student.toLowerCase().includes(keyword)
                );
                
                return foundInStudents;
            });
            
            renderCards(filteredData);
        });
