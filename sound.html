<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ป้องกันเบราว์เซอร์จำ Cache เด็ดขาด -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Soundboard PRO (Vanilla JS)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; overflow-x: hidden; }
        .btn-active { transform: scale(0.92) !important; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5) !important; border-color: #34d399 !important; background-color: #10b981 !important; }
        .btn-active * { color: white !important; }
        .shake-hint { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; border-color: #f59e0b !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center font-sans">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center transition-opacity duration-500">
        <i class="fa-solid fa-headphones-simple text-6xl text-emerald-500 animate-bounce mb-6"></i>
        <h2 class="text-2xl font-black mb-4">กำลังโหลดระบบ...</h2>
        <div class="w-full max-w-md bg-slate-800 rounded-full h-4 mb-2 overflow-hidden mx-4">
            <div id="loading-bar" class="bg-gradient-to-r from-cyan-500 to-emerald-500 h-full w-0 transition-all duration-300"></div>
        </div>
        <p id="loading-text" class="font-mono text-emerald-400">0%</p>
        <p class="text-slate-500 text-sm mt-4 text-center px-4">(ระบบใหม่ HTML5 Audio - กันเสียงซ้อน 100%)</p>
        <button id="btn-start" class="mt-8 hidden bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-emerald-500/30 transition-all active:scale-95">
            เข้าสู่ระบบควบคุม (START)
        </button>
    </div>

    <!-- Main UI -->
    <div id="main-ui" class="w-full max-w-6xl p-4 md:p-8 pb-32 lg:pb-8 flex flex-col items-center opacity-0 transition-opacity duration-500 pointer-events-none">
        
        <div class="w-full flex flex-col lg:flex-row items-center justify-between mb-8 gap-6">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400 tracking-tighter">
                    SOUNDBOARD PRO
                </h1>
                <p id="status-text" class="text-slate-500 text-[10px] font-mono uppercase tracking-[0.3em] mt-1 italic">🟡 INITIALIZING CLOUD...</p>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-4 bg-slate-900/40 p-3 md:p-4 rounded-[2rem] border border-slate-800/50 shadow-2xl">
                <!-- Mode Switch -->
                <div class="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-800 w-full sm:w-auto">
                    <button id="btn-mode-speaker" class="flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all bg-emerald-500 text-white shadow-lg">SPEAKER</button>
                    <button id="btn-mode-remote" class="flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-500 hover:text-slate-300">REMOTE</button>
                </div>
                
                <div class="hidden sm:block h-10 w-[1px] bg-slate-800 mx-1"></div>
                
                <!-- Volume Controls (เปลี่ยนจาก Slider เป็นปุ่ม + / -) -->
                <div class="flex items-center gap-3 w-full sm:w-auto px-2 justify-center">
                    <button id="btn-mute" class="flex-shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all bg-slate-800 text-slate-400">
                        <i id="mute-icon" class="fa-solid fa-volume-high text-lg"></i>
                    </button>
                    
                    <div class="flex items-center gap-2 bg-slate-950 p-1.5 rounded-2xl border border-slate-800">
                        <button id="btn-vol-down" class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-xl hover:bg-slate-700 active:scale-90 transition-all text-white font-bold"><i class="fa-solid fa-minus"></i></button>
                        <div class="w-14 text-center">
                            <span class="text-[9px] font-black uppercase tracking-widest text-slate-500 block">VOL</span>
                            <span id="volume-text" class="text-xs font-black text-emerald-500 block mt-[-2px]">100%</span>
                        </div>
                        <button id="btn-vol-up" class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-xl hover:bg-slate-700 active:scale-90 transition-all text-white font-bold"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sound Grid -->
        <div id="sound-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-5 w-full"></div>

        <!-- Bottom Controls -->
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 lg:relative lg:bg-transparent lg:border-none lg:p-0 lg:mt-6 w-full grid grid-cols-2 gap-4 z-40 max-w-6xl mx-auto">
            <button id="btn-stop" class="bg-red-500/10 text-red-500 border-2 border-red-500/30 rounded-[1.5rem] py-4 md:py-6 font-black text-sm md:text-xl active:scale-95 transition-all shadow-xl flex items-center justify-center gap-3">
                <i class="fa-solid fa-power-off text-lg md:text-2xl"></i> STOP
            </button>
            <button id="btn-fadeout-bottom" class="bg-purple-500/10 text-purple-400 border-2 border-purple-500/30 rounded-[1.5rem] py-3 md:py-5 font-black text-sm md:text-xl transition-all shadow-xl flex flex-col items-center justify-center gap-0.5 select-none">
                <div class="flex items-center gap-3"><i class="fa-solid fa-volume-low text-lg md:text-2xl"></i> FADE OUT</div>
                <span class="hint hidden text-[9px] font-bold text-amber-500 animate-pulse">TAP AGAIN TO FADE!</span>
                <span class="text-[9px] text-purple-600/60 uppercase tracking-widest mt-1">Double Tap</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // เรียง Array ใหม่ตามที่มึงสั่งเป๊ะๆ
        const SOUNDS = [
            { id: '1', label: 'Wordcloud', icon: 'fa-cloud', color: 'text-sky-400', file: 'wordcloud.mp3', freq: 880 },
            { id: '2', label: 'Wow', icon: 'fa-face-surprise', color: 'text-pink-400', file: 'wow.mp3', freq: 440 },
            { id: '3', label: 'Do', icon: 'fa-circle-check', color: 'text-emerald-400', file: 'correct.mp3', freq: 523 },
            { id: '4', label: 'Don\'t', icon: 'fa-circle-xmark', color: 'text-orange-500', file: 'incorrect.mp3', freq: 698 },
            { id: '5', label: 'Comedy', icon: 'fa-masks-theater', color: 'text-purple-400', file: 'comedy.wav', freq: 493 },
            { id: '6', label: 'Drum', icon: 'fa-drum', color: 'text-red-400', file: 'drumcomedy.wav', freq: 587 },
            { id: '7', label: 'Welcome', icon: 'fa-handshake', color: 'text-teal-400', file: 'welcome.mp3', freq: 783 },
            { id: '8', label: 'Ending', icon: 'fa-flag-checkered', color: 'text-blue-400', file: 'ending.mp3', freq: 659 }
        ];
        
        let appMode = 'speaker'; 
        let currentVolume = 1.0;
        let isMuted = false;
        let currentUser = null;
        let startTime = Date.now();
        let lastProcessedTimestamp = Date.now(); // ดักเวลาชัวร์ๆ
        let blockInteraction = false; // ตัวแปรล็อคปุ่มกันนิ้วลั่นเบิ้ล

        // 🛑 โละ AudioContext ทิ้ง ใช้ HTML5 Audio แท้ๆ 100% 🛑
        const audioPlayers = {}; 
        let fadeInterval = null;

        const manualConfig = {  
            apiKey: "AIzaSyCMZAqnQ-ESuC3YGGnRY0obesoKJgwfcfs",  
            authDomain: "soundboard-49d41.firebaseapp.com",  
            projectId: "soundboard-49d41",  
            storageBucket: "soundboard-49d41.firebasestorage.app",  
            messagingSenderId: "985691644771",  
            appId: "1:985691644771:web:49a41139fb4449a7a8e956"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : manualConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'event-soundboard-pro';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        let db, auth;

        const gridContainer = document.getElementById('sound-grid');
        const loadingScreen = document.getElementById('loading-screen');
        const mainUi = document.getElementById('main-ui');
        const btnStart = document.getElementById('btn-start');
        const statusText = document.getElementById('status-text');
        
        function buildGrid() {
            gridContainer.innerHTML = '';
            
            // เก็บเวลาที่กดแต่ละปุ่มแยกกัน
            let buttonTapTimes = {};

            SOUNDS.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `sound-btn relative group bg-slate-900 border-2 border-slate-800/50 rounded-[2rem] p-6 md:p-8 flex flex-col items-center gap-5 transition-all touch-manipulation shadow-lg`;
                btn.dataset.id = s.id;
                btn.innerHTML = `
                    <span class="badge absolute top-5 left-5 text-[10px] font-black px-2.5 py-1 rounded-lg bg-slate-950 text-slate-500 transition-colors">${s.id}</span>
                    <i class="fa-solid ${s.icon} text-4xl md:text-5xl lg:text-6xl ${s.color} transition-transform group-active:scale-90"></i>
                    <span class="label font-black text-xs md:text-sm uppercase tracking-[0.15em] text-slate-400 transition-colors">${s.label}</span>
                    <span class="hint hidden absolute bottom-2 text-[8px] font-bold text-amber-500 animate-pulse">TAP AGAIN!</span>
                `;
                
                // เปลี่ยนเป็น Double Tap ล้วนๆ
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    const now = Date.now();
                    const lastTap = buttonTapTimes[s.id] || 0;

                    if (now - lastTap < 400) {
                        // กดเบิ้ลสำเร็จ
                        buttonTapTimes[s.id] = 0; 
                        btn.classList.remove('shake-hint');
                        btn.querySelector('.hint').classList.add('hidden');
                        
                        handleInteraction(e, 'play', s.id);
                    } else {
                        // กดครั้งแรก
                        buttonTapTimes[s.id] = now;
                        btn.classList.add('shake-hint');
                        btn.querySelector('.hint').classList.remove('hidden');
                        
                        // ถ้านานเกินเคลียร์ทิ้ง
                        setTimeout(() => {
                            btn.classList.remove('shake-hint');
                            const hint = btn.querySelector('.hint');
                            if(hint) hint.classList.add('hidden');
                        }, 400);
                    }
                });
                
                gridContainer.appendChild(btn);
            });

            document.getElementById('btn-stop').onclick = (e) => handleInteraction(e, 'stop');
            
            // ปุ่ม Fadeout (ต้อง Double tap)
            let fadeOutTapTime = 0;
            const btnFade = document.getElementById('btn-fadeout-bottom');
            btnFade.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const now = Date.now();
                if (now - fadeOutTapTime < 400) {
                    sendCommand('fadeout');
                    fadeOutTapTime = 0;
                    btnFade.classList.remove('shake-hint');
                    btnFade.querySelector('.hint').classList.add('hidden');
                    btnFade.classList.add('btn-active');
                    setTimeout(() => btnFade.classList.remove('btn-active'), 150);
                } else {
                    fadeOutTapTime = now;
                    btnFade.classList.add('shake-hint');
                    btnFade.querySelector('.hint').classList.remove('hidden');
                    setTimeout(() => {
                        btnFade.classList.remove('shake-hint');
                        btnFade.querySelector('.hint').classList.add('hidden');
                    }, 400);
                }
            });

            document.getElementById('btn-mode-speaker').onclick = () => setMode('speaker');
            document.getElementById('btn-mode-remote').onclick = () => setMode('remote');
            
            // อัปเดตผูกปุ่ม Volume
            document.getElementById('btn-mute').onclick = () => sendCommand('setMute', null, !isMuted);
            document.getElementById('btn-vol-down').onclick = () => {
                let newVol = Math.max(0, currentVolume - 0.1);
                sendCommand('setVolume', null, newVol);
            };
            document.getElementById('btn-vol-up').onclick = () => {
                let newVol = Math.min(1, currentVolume + 0.1);
                sendCommand('setVolume', null, newVol);
            };
            
            document.onkeydown = (e) => {
                if(e.repeat) return;
                if(e.key >= '1' && e.key <= '8') sendCommand('play', e.key);
                if(e.code === 'Space') { e.preventDefault(); sendCommand('stop'); }
            };
        }

        // ระบบโหลดเสียงแบบ HTML5 Audio
        function initAudioSystem() {
            let loaded = 0;
            
            SOUNDS.forEach(item => {
                // โหลดไฟล์ยัดใส่ object ตรงๆ เลย 1 ไฟล์ต่อ 1 ตัวเล่น
                const audio = new Audio(`./${item.file}?t=${Date.now()}`);
                audio.preload = "auto";
                audioPlayers[item.id] = audio;
                
                loaded++;
                const p = Math.round((loaded / SOUNDS.length) * 100);
                document.getElementById('loading-bar').style.width = `${p}%`;
                document.getElementById('loading-text').innerText = `${p}%`;
            });

            document.getElementById('loading-text').innerText = "✅ READY!";
            btnStart.classList.remove('hidden');
            
            btnStart.onclick = () => {
                // ปลดล็อคระบบเสียงบนมือถือ (ให้มันเล่นเงียบๆ 1 ทีก่อน)
                Object.values(audioPlayers).forEach(a => {
                    a.volume = 0;
                    a.play().then(() => { 
                        a.pause(); 
                        a.currentTime = 0; 
                        a.volume = currentVolume; 
                    }).catch(e => {}); // ช่างมันถ้า error
                });

                loadingScreen.classList.add('opacity-0', 'pointer-events-none');
                mainUi.classList.remove('opacity-0', 'pointer-events-none');
                startTime = Date.now(); 
                lastProcessedTimestamp = Date.now(); // เริ่มนับเวลาใหม่
            };
        }

        function playSound(id) {
            if (appMode === 'remote') return;
            
            // 🛑 หยุดทุกอย่างแบบเด็ดขาด 🛑
            stopAll();
            
            // เล่นตัวใหม่
            const audio = audioPlayers[id];
            if (audio) {
                audio.volume = isMuted ? 0 : currentVolume;
                audio.currentTime = 0; // กลับไปเริ่มวิที่ 0
                audio.play().catch(e => console.error("Play Error:", e));
            }
            flashUI(id);
        }

        function stopAll() {
            // หยุดการลดเสียง Fade Out ก่อน
            if (fadeInterval) {
                clearInterval(fadeInterval);
                fadeInterval = null;
            }
            // สั่ง Pause และ รีเซ็ตเวลาทุกเครื่อง
            Object.values(audioPlayers).forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
        }

        function fadeOutAll() {
            if (appMode === 'remote') return;
            if (fadeInterval) clearInterval(fadeInterval);

            // หาดูว่าตัวไหนกำลังเล่นอยู่บ้าง (ปกติจะเล่นทีละตัวอยู่แล้ว)
            const playingAudios = Object.values(audioPlayers).filter(a => !a.paused && a.currentTime > 0);
            
            if (playingAudios.length === 0) return;

            let steps = 30; // ลดเสียง 30 ระดับ ภายใน 3 วิ
            let stepTime = 3000 / steps; // ประมาณ 100ms ต่อสเต็ป

            fadeInterval = setInterval(() => {
                let finished = true;
                
                playingAudios.forEach(audio => {
                    let currentVol = audio.volume;
                    let fadeStepAmount = currentVolume / steps; // ปริมาณเสียงที่ต้องลดต่อครั้ง

                    if (currentVol > 0.05) {
                        audio.volume = Math.max(0, currentVol - fadeStepAmount);
                        finished = false;
                    } else {
                        audio.pause();
                        audio.currentTime = 0;
                        audio.volume = currentVolume; // คืนค่าเสียงเดิมเตรียมไว้รอบหน้า
                    }
                });

                if (finished) {
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                }
            }, stepTime);
        }

        function handleInteraction(e, action, keyId = null) {
            if (e) e.preventDefault(); 
            
            if (blockInteraction) return; 
            blockInteraction = true;
            setTimeout(() => blockInteraction = false, 150); // ล็อคปุ่มกันกดรัว
            
            sendCommand(action, keyId);
        }

        async function initFirebase() {
            if (!firebaseConfig) {
                statusText.innerText = "❌ NO CONFIG - OFFLINE MODE";
                statusText.classList.add('text-red-400');
                return;
            }
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                if (initialToken) { await signInWithCustomToken(auth, initialToken); } 
                else { await signInAnonymously(auth); }
                
                onAuthStateChanged(auth, (u) => {
                    currentUser = u;
                    if (u) {
                        statusText.innerText = `🟢 SYNC ACTIVE [${u.uid.slice(0,6).toUpperCase()}]`;
                        statusText.classList.remove('text-red-400');
                        statusText.classList.add('text-emerald-400');
                        listenToCloud();
                    } else {
                        statusText.innerText = "🔴 AUTH FAILED";
                    }
                });
            } catch (err) {
                console.error(err);
                statusText.innerText = "❌ CLOUD ERROR";
            }
        }

        function listenToCloud() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'commands_v3'); // หนีไปห้อง v3 เลย
            onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        
                        // 🛑 ถ้าเป็นคำสั่งเก่ากว่าเวลาที่เราเข้าเว็บ หรือเวลาล่าสุดที่รับคำสั่ง ให้เตะทิ้งทันที
                        if (!data.sentAt || data.sentAt <= lastProcessedTimestamp) return;
                        
                        // 🛑 ป้องกันเครื่องตัวเองเล่นเบิ้ล
                        if (currentUser && data.sender === currentUser.uid) return;

                        lastProcessedTimestamp = data.sentAt; // จำเวลาใหม่ไว้
                        executeCommand(data.action, data.keyId, data.value);
                    }
                });
            }, (err) => {
                console.error(err);
                statusText.innerText = "❌ SYNC FAILED";
            });
        }

        async function sendCommand(action, keyId = null, value = null) {
            const now = Date.now();
            lastProcessedTimestamp = now; // อัปเดตเวลาตัวเองด้วย
            executeCommand(action, keyId, value); 
            
            if (currentUser && db) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'commands_v3'), {
                        action, keyId, value, sentAt: now, sender: currentUser.uid
                    });
                } catch(e) { console.error(e); }
            }
        }

        function executeCommand(action, keyId, value) {
            if (action === 'play') playSound(keyId);
            if (action === 'stop') stopAll();
            if (action === 'fadeout') fadeOutAll();
            if (action === 'setVolume') { 
                currentVolume = value; 
                updateVolumeUI(); 
                updateActiveVolumes(); 
            }
            if (action === 'setMute') { 
                isMuted = value; 
                updateVolumeUI(); 
                updateActiveVolumes(); 
            }
        }

        function updateActiveVolumes() {
            const targetVol = isMuted ? 0 : currentVolume;
            // เซ็ต volume ให้ทุกเครื่องเล่น
            Object.values(audioPlayers).forEach(audio => {
                audio.volume = targetVol;
            });
        }

        function setMode(newMode) {
            appMode = newMode;
            document.getElementById('btn-mode-speaker').className = newMode === 'speaker' ? "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all bg-emerald-500 text-white shadow-lg" : "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-500 hover:text-slate-300";
            document.getElementById('btn-mode-remote').className = newMode === 'remote' ? "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all bg-blue-600 text-white shadow-lg" : "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-500 hover:text-slate-300";
        }

        function updateVolumeUI() {
            const btnMute = document.getElementById('btn-mute');
            const iconMute = document.getElementById('mute-icon');
            const txtVol = document.getElementById('volume-text');
            
            if (isMuted) {
                btnMute.className = "flex-shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all bg-red-500 text-white animate-pulse";
                iconMute.className = "fa-solid fa-volume-xmark text-lg";
                txtVol.innerText = "MUTED";
                txtVol.className = "text-xs font-black text-red-500 block mt-[-2px]";
            } else {
                btnMute.className = "flex-shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all bg-slate-800 text-slate-400 hover:bg-slate-700";
                iconMute.className = "fa-solid fa-volume-high text-lg";
                txtVol.innerText = `${Math.round(currentVolume * 100)}%`;
                txtVol.className = "text-xs font-black text-emerald-500 block mt-[-2px]";
            }
        }

        function flashUI(id) {
            let el = document.querySelector(`.sound-btn[data-id="${id}"]`);
            if(!el) return;
            el.classList.add('btn-active');
            setTimeout(() => el.classList.remove('btn-active'), 150);
        }

        buildGrid();
        initAudioSystem();
        initFirebase();
    </script>
</body>
</html>
