<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soundboard PRO (Vanilla JS)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ป้องกันการลากคลุมข้อความเวลาแตะเบิ้ลบนมือถือ */
        body { -webkit-tap-highlight-color: transparent; user-select: none; overflow-x: hidden; }
        .btn-active { transform: scale(0.92) !important; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5) !important; border-color: #34d399 !important; background-color: #10b981 !important; }
        .btn-active * { color: white !important; }
        .shake-hint { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; border-color: #f59e0b !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center font-sans">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center transition-opacity duration-500">
        <i class="fa-solid fa-headphones-simple text-6xl text-emerald-500 animate-bounce mb-6"></i>
        <h2 class="text-2xl font-black mb-4">กำลังโหลดระบบ...</h2>
        <div class="w-full max-w-md bg-slate-800 rounded-full h-4 mb-2 overflow-hidden mx-4">
            <div id="loading-bar" class="bg-gradient-to-r from-cyan-500 to-emerald-500 h-full w-0 transition-all duration-300"></div>
        </div>
        <p id="loading-text" class="font-mono text-emerald-400">0%</p>
        <p class="text-slate-500 text-sm mt-4 text-center px-4">(ถ้าไม่มีไฟล์ .mp3 ระบบจะใช้เสียงสังเคราะห์แทนอัตโนมัติ)</p>
        <button id="btn-start" class="mt-8 hidden bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-emerald-500/30 transition-all active:scale-95">
            เข้าสู่ระบบควบคุม (คลิกเพื่อเปิดเสียง)
        </button>
    </div>

    <!-- Main UI -->
    <div id="main-ui" class="w-full max-w-6xl p-4 md:p-8 pb-32 lg:pb-8 flex flex-col items-center opacity-0 transition-opacity duration-500 pointer-events-none">
        
        <!-- Header & Controls -->
        <div class="w-full flex flex-col lg:flex-row items-center justify-between mb-8 gap-6">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400 tracking-tighter">
                    SOUNDBOARD PRO
                </h1>
                <p id="status-text" class="text-slate-500 text-[10px] font-mono uppercase tracking-[0.3em] mt-1">🔴 CONNECTING...</p>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-4 bg-slate-900/40 p-3 md:p-4 rounded-[2rem] border border-slate-800/50 shadow-2xl">
                <!-- Mode Switcher -->
                <div class="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-800 w-full sm:w-auto">
                    <button id="btn-mode-speaker" class="flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all bg-emerald-500 text-white shadow-lg">SPEAKER</button>
                    <button id="btn-mode-remote" class="flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-500 hover:text-slate-300">REMOTE</button>
                </div>
                
                <div class="hidden sm:block h-10 w-[1px] bg-slate-800 mx-1"></div>
                
                <!-- Volume Control -->
                <div class="flex items-center gap-4 w-full sm:w-auto px-2">
                    <button id="btn-mute" class="flex-shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all bg-slate-800 text-slate-400">
                        <i id="mute-icon" class="fa-solid fa-volume-high text-lg"></i>
                    </button>
                    <div class="flex flex-col gap-1.5 flex-grow sm:w-40 md:w-56">
                        <input id="slider-volume" type="range" min="0" max="1" step="0.05" value="1" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                        <div class="flex justify-between text-[10px] font-black uppercase tracking-widest">
                            <span class="text-slate-500">MASTER VOL</span>
                            <span id="volume-text" class="text-emerald-500">100%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grid Buttons (จะถูกสร้างด้วย JS) -->
        <div id="sound-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-5 w-full"></div>

        <!-- Action Buttons -->
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 lg:relative lg:bg-transparent lg:border-none lg:p-0 lg:mt-6 w-full grid grid-cols-2 gap-4 z-40 max-w-6xl mx-auto">
            <button id="btn-stop" class="bg-red-500/10 text-red-500 border-2 border-red-500/30 rounded-[1.5rem] py-5 md:py-6 font-black text-sm md:text-xl active:scale-95 transition-all shadow-xl flex items-center justify-center gap-3">
                <i class="fa-solid fa-power-off text-lg md:text-2xl"></i> STOP
            </button>
            <button id="btn-applause" class="bg-emerald-500/10 text-emerald-400 border-2 border-emerald-500/30 rounded-[1.5rem] py-5 md:py-6 font-black text-sm md:text-xl active:scale-95 transition-all shadow-xl flex items-center justify-center gap-3">
                <i class="fa-solid fa-hands-clapping text-lg md:text-2xl"></i> APPLAUSE
            </button>
        </div>

    </div>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuration & Data ---
        const SOUNDS = [
            { id: '1', label: 'Applause', icon: 'fa-hands-clapping', color: 'text-emerald-400', file: 'sound1.mp3', freq: 440 },
            { id: '2', label: 'Laugh', icon: 'fa-face-laugh-squint', color: 'text-amber-400', file: 'sound2.mp3', freq: 493 },
            { id: '3', label: 'Rimshot', icon: 'fa-drum', color: 'text-red-400', file: 'sound3.mp3', freq: 523 },
            { id: '4', label: 'Suspense', icon: 'fa-mask', color: 'text-purple-400', file: 'sound4.mp3', freq: 587 },
            { id: '5', label: 'Victory', icon: 'fa-trophy', color: 'text-yellow-400', file: 'sound5.mp3', freq: 659 },
            { id: '6', label: 'Buzzer', icon: 'fa-triangle-exclamation', color: 'text-orange-500', file: 'sound6.mp3', freq: 698 },
            { id: '7', label: 'Thinking', icon: 'fa-brain', color: 'text-pink-400', file: 'sound7.mp3', freq: 783 },
            { id: '8', label: 'Whoosh', icon: 'fa-wind', color: 'text-sky-400', file: 'sound8.mp3', freq: 880 },
            { id: '9', label: 'Outro', icon: 'fa-door-open', color: 'text-indigo-400', file: 'sound9.mp3', freq: 987 },
            { id: '0', label: 'Intro', icon: 'fa-clapperboard', color: 'text-teal-400', file: 'sound0.mp3', freq: 1046 },
        ];
        
        // --- State Variables ---
        let appMode = 'speaker'; // 'speaker' or 'remote'
        let currentVolume = 1.0;
        let isMuted = false;
        let lastTap = { id: null, time: 0 };
        let currentUser = null;
        let startTime = Date.now();
        let lastProcessedCmdId = null;

        // --- Audio System Variables ---
        let audioCtx = null;
        let audioBuffers = {}; // { id: AudioBuffer | null } (null = MP3 not found -> will bypass)
        let activeSources = [];

        // --- Firebase Setup ---
        const firebaseConfig = typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : null;
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'event-soundboard-pro';
        let db, auth;

        // --- DOM Elements ---
        const gridContainer = document.getElementById('sound-grid');
        const loadingScreen = document.getElementById('loading-screen');
        const mainUi = document.getElementById('main-ui');
        const btnStart = document.getElementById('btn-start');
        
        // --- 1. Build UI Grid ---
        function buildGrid() {
            SOUNDS.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `sound-btn relative group bg-slate-900 border-2 border-slate-800/50 rounded-[2rem] p-6 md:p-8 flex flex-col items-center gap-5 transition-all touch-manipulation shadow-lg`;
                btn.dataset.id = s.id;
                btn.innerHTML = `
                    <span class="badge absolute top-5 left-5 text-[10px] font-black px-2.5 py-1 rounded-lg bg-slate-950 text-slate-500 transition-colors">${s.id}</span>
                    <i class="fa-solid ${s.icon} text-4xl md:text-5xl lg:text-6xl ${s.color} transition-transform group-active:scale-90"></i>
                    <span class="label font-black text-xs md:text-sm uppercase tracking-[0.15em] text-slate-400 transition-colors">${s.label}</span>
                    <span class="hint hidden absolute bottom-2 text-[8px] font-bold text-amber-500 animate-pulse">TAP AGAIN!</span>
                `;
                
                // Event Listener (รองรับทั้ง Mouse และ Touch)
                btn.addEventListener('pointerdown', (e) => handleInteraction(e, 'play', s.id));
                gridContainer.appendChild(btn);
            });

            // Action Buttons
            document.getElementById('btn-stop').addEventListener('pointerdown', (e) => handleInteraction(e, 'stop'));
            document.getElementById('btn-applause').addEventListener('pointerdown', (e) => handleInteraction(e, 'play', 'applause'));
            
            // Mode Switcher
            document.getElementById('btn-mode-speaker').addEventListener('click', () => setMode('speaker'));
            document.getElementById('btn-mode-remote').addEventListener('click', () => setMode('remote'));

            // Volume & Mute
            document.getElementById('btn-mute').addEventListener('click', () => sendCommand('setMute', null, !isMuted));
            document.getElementById('slider-volume').addEventListener('input', (e) => sendCommand('setVolume', null, parseFloat(e.target.value)));
            
            // Keyboard (PC)
            document.addEventListener('keydown', (e) => {
                if(e.repeat) return;
                if(e.key >= '0' && e.key <= '9') sendCommand('play', e.key);
                if(e.code === 'Space') { e.preventDefault(); sendCommand('stop'); }
                if(e.code === 'Enter') { e.preventDefault(); sendCommand('play', 'applause'); }
            });
        }

        // --- 2. Initialize Audio & Preload ---
        async function initAudioSystem() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            const allFiles = [...SOUNDS, { id: 'applause', file: 'applause.mp3' }];
            let loaded = 0;

            for (const item of allFiles) {
                try {
                    const res = await fetch(`./${item.file}`);
                    if (!res.ok) throw new Error('File not found');
                    const arrayBuffer = await res.arrayBuffer();
                    audioBuffers[item.id] = await audioCtx.decodeAudioData(arrayBuffer);
                } catch (err) {
                    // หาไฟล์ไม่เจอ ปล่อยไว้เป็น null ระบบจะ Bypass ใช้เสียง Synth แทน
                    console.log(`[Bypass] ไม่พบไฟล์ ${item.file} -> จะใช้เสียงสังเคราะห์แทน`);
                    audioBuffers[item.id] = null; 
                }
                
                loaded++;
                const p = Math.round((loaded / allFiles.length) * 100);
                document.getElementById('loading-bar').style.width = `${p}%`;
                document.getElementById('loading-text').innerText = `${p}%`;
            }

            // แสดงปุ่มเริ่มทำงาน (ต้องคลิกเพื่อ Allow Audio Context)
            document.getElementById('loading-text').innerText = "✅ พร้อมใช้งาน!";
            btnStart.classList.remove('hidden');
            btnStart.addEventListener('click', () => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                loadingScreen.classList.add('opacity-0', 'pointer-events-none');
                mainUi.classList.remove('opacity-0', 'pointer-events-none');
            });
        }

        // --- 3. Playback Logic (Bypass Included) ---
        function playSound(id) {
            if (appMode === 'remote') return; // รีโมทไม่ต้องดัง
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // เช็คว่ามีไฟล์โหลดไว้ไหม
            if (audioBuffers[id]) {
                // เล่นจากไฟล์ MP3
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffers[id];
                const gain = audioCtx.createGain();
                gain.gain.value = isMuted ? 0 : currentVolume;
                source.connect(gain);
                gain.connect(audioCtx.destination);
                source.start(0);
                activeSources.push(source);
                source.onended = () => { activeSources = activeSources.filter(s => s !== source); };
            } else {
                // BYPASS: เล่นเสียงสังเคราะห์ (Synth)
                playSynthBeep(id);
            }

            flashUI(id);
        }

        function playSynthBeep(id) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // หาความถี่จาก Config
            const soundConfig = SOUNDS.find(s => s.id === id);
            const freq = id === 'applause' ? 1200 : (soundConfig ? soundConfig.freq : 440);
            
            osc.type = id === 'applause' ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // ตั้งค่า Volume
            const targetVol = isMuted ? 0 : currentVolume * 0.1; // เบาลงหน่อยเดี๋ยวหูแตก
            gain.gain.setValueAtTime(targetVol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5); // เสียงค่อยๆ หายใน 0.5 วิ
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function stopAll() {
            activeSources.forEach(s => { try { s.stop(); } catch(e){} });
            activeSources = [];
        }

        // --- 4. Interaction & Double Tap Logic ---
        function handleInteraction(e, action, keyId = null) {
            const now = Date.now();
            const isTouch = e.pointerType === 'touch';

            // ถ้าเป็นเมาส์ (PC) ให้ทำงานเลย
            if (!isTouch) {
                sendCommand(action, keyId);
                return;
            }

            // ถ้าเป็นทัชสกรีน (Mobile) ปุ่ม Play ต้องเบิ้ล 2 ที
            if (action === 'play') {
                const timeDiff = now - lastTap.time;
                if (lastTap.id === keyId && timeDiff < 350) {
                    // Double Tap สำเร็จ
                    sendCommand(action, keyId);
                    lastTap = { id: null, time: 0 };
                    clearShakeUI(keyId);
                } else {
                    // Tap ครั้งแรก
                    lastTap = { id: keyId, time: now };
                    showShakeUI(keyId);
                    setTimeout(() => clearShakeUI(keyId), 350);
                }
            } else {
                // Stop ให้ทำงานทีเดียวเลยเพื่อความไว
                sendCommand(action, keyId);
            }
        }

        // --- 5. Network & Firebase Logic ---
        async function initFirebase() {
            if (!firebaseConfig) return;
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // 1. Auth Rule
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (u) => {
                currentUser = u;
                document.getElementById('status-text').innerText = u ? `🟢 SYNC ACTIVE [${u.uid.slice(0,6)}]` : '🔴 CONNECTING...';
                
                // 2. Listen for Data (Speaker Mode)
                if (u) listenToCloud();
            });
        }

        function listenToCloud() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'commands');
            onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        // ป้องกันดึงข้อมูลเก่า
                        if (data.sentAt && data.sentAt > startTime && change.doc.id !== lastProcessedCmdId) {
                            lastProcessedCmdId = change.doc.id;
                            executeCommand(data.action, data.keyId, data.value);
                        }
                    }
                });
            }, (err) => console.error("Snapshot error:", err));
        }

        async function sendCommand(action, keyId = null, value = null) {
            // ทำในเครื่องตัวเองก่อน (No delay)
            executeCommand(action, keyId, value);

            // ส่งขึ้น Cloud ให้เครื่องอื่นทำตาม
            if (currentUser && db) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'commands'), {
                        action, keyId, value, sentAt: Date.now(), sender: currentUser.uid
                    });
                } catch(e) { console.error("Send failed:", e); }
            }
        }

        function executeCommand(action, keyId, value) {
            if (action === 'play') playSound(keyId);
            if (action === 'stop') stopAll();
            if (action === 'setVolume') {
                currentVolume = value;
                updateVolumeUI();
            }
            if (action === 'setMute') {
                isMuted = value;
                updateVolumeUI();
            }
        }

        // --- 6. UI Updaters ---
        function setMode(newMode) {
            appMode = newMode;
            const btnSpk = document.getElementById('btn-mode-speaker');
            const btnRem = document.getElementById('btn-mode-remote');
            if(newMode === 'speaker') {
                btnSpk.className = "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all bg-emerald-500 text-white shadow-lg";
                btnRem.className = "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-500 hover:text-slate-300";
            } else {
                btnRem.className = "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all bg-blue-600 text-white shadow-lg";
                btnSpk.className = "flex-1 sm:flex-none px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-500 hover:text-slate-300";
            }
        }

        function updateVolumeUI() {
            document.getElementById('slider-volume').value = currentVolume;
            const btnMute = document.getElementById('btn-mute');
            const iconMute = document.getElementById('mute-icon');
            const txtVol = document.getElementById('volume-text');

            if (isMuted) {
                btnMute.className = "flex-shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all bg-red-500 text-white animate-pulse";
                iconMute.className = "fa-solid fa-volume-xmark text-lg";
                txtVol.innerText = "MUTED";
                txtVol.className = "text-red-500 font-bold";
            } else {
                btnMute.className = "flex-shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all bg-slate-800 text-slate-400 hover:bg-slate-700";
                iconMute.className = "fa-solid fa-volume-high text-lg";
                txtVol.innerText = `${Math.round(currentVolume * 100)}%`;
                txtVol.className = "text-emerald-500 font-bold";
            }
        }

        function flashUI(id) {
            const el = id === 'applause' ? document.getElementById('btn-applause') : document.querySelector(`.sound-btn[data-id="${id}"]`);
            if(!el) return;
            el.classList.add('btn-active');
            setTimeout(() => el.classList.remove('btn-active'), 150);
        }

        function showShakeUI(id) {
            const el = document.querySelector(`.sound-btn[data-id="${id}"]`);
            if(!el) return;
            el.classList.add('shake-hint');
            el.querySelector('.hint').classList.remove('hidden');
        }

        function clearShakeUI(id) {
            const el = document.querySelector(`.sound-btn[data-id="${id}"]`);
            if(!el) return;
            el.classList.remove('shake-hint');
            el.querySelector('.hint').classList.add('hidden');
        }

        // --- Boot Sequence ---
        buildGrid();
        initAudioSystem(); // เริ่มโหลดเสียง (หรือเตรียม Bypass) ทันที
        initFirebase();    // เชื่อมต่อระบบ Cloud Sync

    </script>
</body>
</html>
